    <circle cx="300" cy="320" r="20" fill="url(#emitterGlow)"/>
    <circle cx="300" cy="320" r="10" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="300" cy="320" r="5" fill="#FFFFFF"/>
    
    <text x="300" y="448" 
          text-anchor="middle"
