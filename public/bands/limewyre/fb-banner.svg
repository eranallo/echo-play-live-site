<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" 
     viewBox="0 0 1640 624" 
     width="1640" 
     height="624">
  
  <defs>
    <radialGradient id="hitGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="40%" stop-color="#D9FF66" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#AEFF00" stop-opacity="0"/>
    </radialGradient>
    
    <radialGradient id="emitterGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#AEFF00" stop-opacity="0"/>
    </radialGradient>
    
    <pattern id="scanlines" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#0a0a0a"/>
      <rect y="2" width="4" height="2" fill="#000"/>
    </pattern>
    
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.7"/>
    </radialGradient>
    
    <linearGradient id="atmosphere" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a1a00" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a1a00" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  
  <rect width="1640" height="624" fill="#000000"/>
  <rect width="1640" height="624" fill="url(#scanlines)" opacity="0.4"/>
  <rect width="1640" height="624" fill="url(#atmosphere)"/>
  
  <ellipse cx="820" cy="320" rx="700" ry="280" fill="#AEFF00" opacity="0.04"/>
  <ellipse cx="820" cy="320" rx="450" ry="200" fill="#AEFF00" opacity="0.06"/>
  
  <!-- Left text block -->
  <g transform="translate(220, 240)">
    <text x="0" y="0" 
