    <circle cx="480" cy="220" r="14" fill="url(#hitGlow)"/>
    <circle cx="195" cy="135" r="13" fill="url(#hitGlow)"/>
    <circle cx="405" cy="135" r="13" fill="url(#hitGlow)"/>
    
    <g fill="#FFFFFF">
