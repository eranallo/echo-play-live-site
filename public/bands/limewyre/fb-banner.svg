      <line x1="300" y1="320" x2="120" y2="220"/>
      <line x1="300" y1="320" x2="480" y2="220"/>
      <line x1="300" y1="320" x2="195" y2="135"/>
      <line x1="300" y1="320" x2="405" y2="135"/>
    </g>
    <g stroke="#AEFF00" stroke-width="14" stroke-linecap="round" opacity="0.32" fill="none">
      <line x1="300" y1="320" x2="300" y2="115"/>
      <line x1="300" y1="320" x2="120" y2="220"/>
      <line x1="300" y1="320" x2="480" y2="220"/>
      <line x1="300" y1="320" x2="195" y2="135"/>
      <line x1="300" y1="320" x2="405" y2="135"/>
    </g>
    <g stroke="#D9FF66" stroke-width="7" stroke-linecap="round" opacity="0.75" fill="none">
      <line x1="300" y1="320" x2="300" y2="115"/>
      <line x1="300" y1="320" x2="120" y2="220"/>
      <line x1="300" y1="320" x2="480" y2="220"/>
      <line x1="300" y1="320" x2="195" y2="135"/>
      <line x1="300" y1="320" x2="405" y2="135"/>
    </g>
    <g stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" fill="none">
      <line x1="300" y1="320" x2="300" y2="115"/>
      <line x1="300" y1="320" x2="120" y2="220"/>
      <line x1="300" y1="320" x2="480" y2="220"/>
      <line x1="300" y1="320" x2="195" y2="135"/>
      <line x1="300" y1="320" x2="405" y2="135"/>
    </g>
    
    <circle cx="300" cy="115" r="16" fill="url(#hitGlow)"/>
