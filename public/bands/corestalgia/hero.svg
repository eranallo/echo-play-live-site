<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <!-- Radial cracked-glass pattern from a focal point -->
    <radialGradient id="vignette" cx="50%" cy="55%" r="80%">
      <stop offset="0%" stop-color="#8B1E1E" stop-opacity="0.10"/>
      <stop offset="40%" stop-color="#0D0D0D" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="rustGlow" cx="50%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#8B1E1E" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#8B1E1E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="atmosphere" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1B1B1B" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0D0D0D" stop-opacity="0.8"/>
    </linearGradient>
    <pattern id="grain" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="3" fill="#0D0D0D"/>
      <circle cx="1" cy="1" r="0.4" fill="#ECE2D9" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Base layer: ash black -->
  <rect width="1600" height="900" fill="#0D0D0D"/>
  <!-- Grain -->
  <rect width="1600" height="900" fill="url(#grain)" opacity="0.5"/>
  <!-- Vignette -->
  <rect width="1600" height="900" fill="url(#vignette)"/>
  <!-- Atmospheric haze -->
  <rect width="1600" height="900" fill="url(#atmosphere)"/>
  <!-- Subtle rust glow at center -->
  <ellipse cx="800" cy="540" rx="600" ry="280" fill="url(#rustGlow)"/>

  <!-- Cracked-glass spider web pattern from impact point (800, 540) -->
  <g stroke="#ECE2D9" stroke-width="0.8" opacity="0.18" fill="none" stroke-linecap="round">
    <!-- Radiating cracks -->
    <line x1="800" y1="540" x2="160" y2="60"/>
    <line x1="800" y1="540" x2="50" y2="320"/>
    <line x1="800" y1="540" x2="80" y2="700"/>
    <line x1="800" y1="540" x2="350" y2="880"/>
    <line x1="800" y1="540" x2="900" y2="900"/>
    <line x1="800" y1="540" x2="1380" y2="870"/>
    <line x1="800" y1="540" x2="1560" y2="660"/>
    <line x1="800" y1="540" x2="1580" y2="380"/>
    <line x1="800" y1="540" x2="1450" y2="80"/>
    <line x1="800" y1="540" x2="950" y2="40"/>
    <line x1="800" y1="540" x2="600" y2="20"/>
    <line x1="800" y1="540" x2="240" y2="180"/>
    <!-- Concentric arcs at varying distances -->
    <path d="M 600 540 A 200 200 0 0 1 1000 540"/>
    <path d="M 500 540 A 300 300 0 0 1 1100 540"/>
    <path d="M 380 540 A 420 420 0 0 1 1220 540"/>
    <path d="M 250 540 A 550 550 0 0 1 1350 540"/>
    <path d="M 100 540 A 700 700 0 0 1 1500 540"/>
  </g>

  <!-- Stronger cracks layer (whiter, thicker, fewer) -->
  <g stroke="#ECE2D9" stroke-width="1.4" opacity="0.32" fill="none" stroke-linecap="round">
    <line x1="800" y1="540" x2="160" y2="60"/>
    <line x1="800" y1="540" x2="80" y2="700"/>
    <line x1="800" y1="540" x2="1380" y2="870"/>
    <line x1="800" y1="540" x2="1450" y2="80"/>
    <line x1="800" y1="540" x2="600" y2="20"/>
  </g>

  <!-- Impact point glow -->
  <circle cx="800" cy="540" r="40" fill="#ECE2D9" opacity="0.04"/>
  <circle cx="800" cy="540" r="12" fill="#ECE2D9" opacity="0.10"/>

  <!-- Wordmark — system serif as placeholder (real distressed gothic logo to come) -->
  <text x="800" y="450"
        text-anchor="middle"
        font-family="UnifrakturMaguntia, MedievalSharp, 'Pirata One', Cinzel, 'Trajan Pro', Georgia, serif"
        font-size="180"
        font-weight="400"
        letter-spacing="4"
        fill="#ECE2D9"
        opacity="0.95">Corestalgia</text>

  <!-- Tagline in rust red -->
  <text x="800" y="510"
        text-anchor="middle"
        font-family="'Trajan Pro', Cinzel, Georgia, serif"
        font-size="22"
        font-weight="700"
        letter-spacing="14"
        fill="#8B1E1E">A TRIBUTE TO THE METALCORE ERA</text>
</svg>
